<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 Viewer</title>

  <!-- pannellum -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      position: relative;
      font-family: sans-serif;
    }

    #panorama {
      width: 100%;
      height: 100vh;
    }

    /* オーバーレイ文字 */
    .overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 14px;
      animation: fadeOut 3s ease 3s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div id="panorama"></div>

<!-- ここがUIテキスト -->
<div class="overlay">
  ドラッグして見てね
</div>

<script>
window.addEventListener('DOMContentLoaded', function() {
  pannellum.viewer('panorama', {
    type: "equirectangular",
    panorama: "./panorama.jpg",
    autoLoad: true,

    // ちょいカスタム
    yaw: 180,
    pitch: 0,
    hfov: 100
  });
});
</script>

</body>
</html>
